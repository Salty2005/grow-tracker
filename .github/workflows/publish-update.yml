name: Publish OTA Update

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish OTA Update
        run: npx eas-cli update --platform android --branch production --environment production --message "Release ${{ github.event.release.tag_name }}"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
